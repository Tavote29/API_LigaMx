name: CI/CD Liga MX API

on:
  # Fase 1 (CI): Se dispara al hacer un Pull Request hacia main
  pull_request:
    branches: [ "main" ]
  # Fase 2 (CD): Se dispara cuando el código se fusiona en main
  push:
    branches: [ "main" ]

jobs:

  # 1 (Pruebas y Compilación)
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./liga-mx # Apunta a tu subcarpeta de Spring Boot
        
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y Ejecutar Pruebas
        run: mvn clean package -DskipTests


  # 2:(Docker y Producción)
  deploy:
    # Este trabajo SOLO corre si el evento fue un push a main y las pruebas pasaron
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar el código
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y subir imagen Docker
        # Asegúrate de que el Dockerfile esté en la ruta correcta o ajusta el contexto (.)
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/api-ligamx:latest ./liga-mx
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-ligamx:latest
      